<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>emptyarr — Login</title>
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f1117;
    color: #e2e8f0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-wrap {
    width: 100%;
    max-width: 380px;
    padding: 20px;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo-icon {
    font-size: 40px;
    display: block;
    margin-bottom: 10px;
  }
  .login-logo-text {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .login-logo-sub {
    font-size: 12px;
    color: #64748b;
    margin-top: 2px;
  }
  .login-card {
    background: #1a1f2e;
    border: 1px solid #2d3748;
    border-radius: 12px;
    padding: 28px;
  }
  .login-title {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 20px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #94a3b8;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-input {
    width: 100%;
    background: #0f1117;
    border: 1px solid #2d3748;
    border-radius: 7px;
    padding: 10px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: #e2e8f0;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: #6366f1; }
  .form-input.error { border-color: #f87171; }
  .error-msg {
    background: #3b0a0a;
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 7px;
    padding: 10px 14px;
    font-size: 13px;
    color: #fca5a5;
    margin-bottom: 16px;
  }
  .login-btn {
    width: 100%;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 11px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 4px;
  }
  .login-btn:hover { background: #4f46e5; }
  .login-btn:active { background: #3730a3; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <span class="login-logo-icon"><img src="/static/icon.png" alt="emptyarr" style="width:52px;height:52px;object-fit:contain;"></span>
    <div class="login-logo-text">emptyarr</div>
    <div class="login-logo-sub">plex trash watchdog</div>
  </div>
  <div class="login-card">
    <div class="login-title">Sign in</div>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input {% if error %}error{% endif %}"
               type="text" id="username" name="username" autofocus autocomplete="username" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input {% if error %}error{% endif %}"
               type="password" id="password" name="password" autocomplete="current-password" />
      </div>
      <button class="login-btn" type="submit">Sign in</button>
    </form>
  </div>
</div>
</body>
</html>
